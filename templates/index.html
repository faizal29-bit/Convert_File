<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title># LocalConvert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="container hd-inner">
      <div class="logo" id="logo-link">
        <div class="logo-mark">LC</div>
        <span class="logo-text">LocalConvert</span>
      </div>
      <div class="header-right">
        <span class="badge-local">🔒 Lokal</span>
        <span class="badge-local" id="lo-badge">...</span>
      </div>
    </div>
  </header>

  <!-- VIEW: HOME -->
  <div id="view-home" class="view active">
    <section class="hero">
      <div class="container">
        <h1 class="hero-title">Convert File<br/><span class="gradient-text">Simple & Worth it</span></h1>
      </div>
    </section>

    <section class="tools-section">
      <div class="container">
        <h2 class="section-title">Pilih Alat Konversi</h2>
        <div class="tools-grid" id="tools-grid"><!-- inject by JS --></div>
      </div>
    </section>

    <div class="status-bar" id="status-bar"></div>
  </div>

  <!-- VIEW: TOOL -->
  <div id="view-tool" class="view">
    <div class="container">

      <button class="back-btn" id="back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M5 12l7 7M5 12l7-7"/></svg>
        Semua Alat
      </button>

      <div class="tool-header" id="tool-header">
        <div class="tool-icon-lg" id="th-icon"></div>
        <div class="tool-header-text">
          <h2 id="th-title"></h2>
          <p id="th-desc"></p>
        </div>
      </div>

      <!-- UPLOAD AREA -->
      <div class="upload-area" id="upload-area">
        <div class="upload-inner">
          <div class="upload-svg">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <p class="upload-main">Seret & Letakkan file di sini</p>
          <p class="upload-or">atau</p>
          <button class="btn-pick" id="btn-pick">Pilih File dari Komputer</button>
          <input type="file" id="file-input" multiple hidden />
          <p class="upload-hint" id="upload-hint"></p>
        </div>
      </div>

      <!-- FILE LIST -->
      <div id="file-list-wrap" style="display:none">
        <div class="file-list-header">
          <span id="file-count-label">0 file dipilih</span>
          <button class="btn-add-more" id="btn-add-more">+ Tambah File</button>
        </div>
        <div class="file-list" id="file-list"></div>
      </div>

      <!-- ACTION -->
      <div class="action-bar" id="action-bar" style="display:none">
        <button class="btn-convert" id="btn-convert">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          Konversi Sekarang
        </button>
        <button class="btn-clear-all" id="btn-clear-all">Hapus Semua</button>
      </div>

      <!-- PROGRESS -->
      <div class="progress-wrap" id="progress-wrap" style="display:none">
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <p class="progress-msg" id="progress-msg">Sedang mengkonversi, harap tunggu…</p>
        <div class="progress-dots">
          <span></span><span></span><span></span>
        </div>
      </div>

      <!-- RESULTS -->
      <div class="results-wrap" id="results-wrap" style="display:none">
        <div class="results-header">
          <div class="results-check">✓</div>
          <div>
            <h3 class="results-title">Konversi Berhasil!</h3>
            <p class="results-sub" id="results-sub"></p>
          </div>
        </div>
        <div class="results-list" id="results-list"></div>
        <div class="results-actions">
          <button class="btn-zip" id="btn-zip" style="display:none">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Unduh Semua (ZIP)
          </button>
          <button class="btn-new-conv" id="btn-new-conv">Konversi File Baru</button>
        </div>
      </div>

    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 LocalConvert by Faizal safaat.</p>
    </div>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
